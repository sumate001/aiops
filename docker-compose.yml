services:
  # ── A1 — Isolation Forest ML ────────────────────────────────────────
  log-ml:
    build: ./log-ml
    ports:
      - "3050:3050"
    volumes:
      - log-ml-models:/app/model_store
    environment:
      - ML_MODEL_STORE=/app/model_store
      - ML_MIN_WINDOWS=30
      - ML_CONTAMINATION=0.05
    restart: unless-stopped

  # ── A1+A3+AA — Log Analyzer ─────────────────────────────────────────
  log-analyzer:
    build: ./log-analyzer
    ports:
      - "8200:8200"
    volumes:
      - log-analyzer-db:/app/data
    environment:
      - PYTHONUNBUFFERED=1
      - OLLAMA_BASE_URL=${OLLAMA_BASE_URL:-http://host.docker.internal:11434}
      - OLLAMA_MODEL=${OLLAMA_MODEL:-qwen3.6:27b}
      - LOG_ML_BASE_URL=http://log-ml:3050
      - PERPLEXICA_BASE_URL=http://vane:3001
      - PERPLEXICA_ENABLED=${PERPLEXICA_ENABLED:-true}
      - PERPLEXICA_CHAT_MODEL=${PERPLEXICA_CHAT_MODEL:-qwen3.6:27b}
      - CALLBACK_URL=http://logsim-backend:8071/api/analysis-callback
      - CALLBACK_ENABLED=${CALLBACK_ENABLED:-true}
    extra_hosts:
      - "host.docker.internal:host-gateway"
    depends_on:
      - log-ml
      - vane
    restart: unless-stopped


  # ── log-analyzer frontend ────────────────────────────────────────────
  log-analyzer-ui:
    build:
      context: ./log-analyzer/frontend
      dockerfile: Dockerfile
    ports:
      - "3100:3100"
    environment:
      - PORT=3100
      - API_BASE_URL=http://log-analyzer:8200
      - PERPLEXICA_BASE_URL=http://vane:3001
      - OLLAMA_BASE_URL=${OLLAMA_BASE_URL:-http://host.docker.internal:11434}
    extra_hosts:
      - "host.docker.internal:host-gateway"
    depends_on:
      - log-analyzer
    restart: unless-stopped

  # ── A2 — Vane (Perplexica + bundled SearXNG) ────────────────────────
  vane:
    build: ./perplexica-src
    ports:
      - "3001:3001"
      - "4000:8080"
    volumes:
      - vane-data:/home/vane/data
    environment:
      - PORT=3001
      - DATA_DIR=/home/vane
      - SEARXNG_API_URL=http://localhost:8080
    extra_hosts:
      - "host.docker.internal:host-gateway"
    restart: unless-stopped

  # ── LogSim backend ──────────────────────────────────────────────────
  logsim-backend:
    build: ../../logsim/backend
    ports:
      - "8071:8071"
    environment:
      - PYTHONUNBUFFERED=1
    restart: unless-stopped

  # ── LogSim frontend ─────────────────────────────────────────────────
  logsim-frontend:
    build: ../../logsim/frontend
    ports:
      - "3200:3200"
    environment:
      - PORT=3200
    depends_on:
      - logsim-backend
    restart: unless-stopped

  # ── Observability — Prometheus ──────────────────────────────────────
  prometheus:
    image: prom/prometheus:latest
    ports:
      - "9090:9090"
    volumes:
      - ./prometheus/prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - prometheus-data:/prometheus
    command:
      - "--config.file=/etc/prometheus/prometheus.yml"
      - "--storage.tsdb.retention.time=30d"
    restart: unless-stopped

  # ── Observability — Grafana ──────────────────────────────────────────
  grafana:
    image: grafana/grafana:latest
    ports:
      - "3003:3000"
    volumes:
      - grafana-data:/var/lib/grafana
      - ./grafana/provisioning:/etc/grafana/provisioning:ro
    environment:
      - GF_SECURITY_ADMIN_USER=admin
      - GF_SECURITY_ADMIN_PASSWORD=godeyes
      - GF_USERS_ALLOW_SIGN_UP=false
    depends_on:
      - prometheus
    restart: unless-stopped

volumes:
  log-analyzer-db:
  log-ml-models:
  vane-data:
  prometheus-data:
  grafana-data:
